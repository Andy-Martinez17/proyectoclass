<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOME</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- Sidebar -->
  <div class="flex min-h-screen">

    <aside class="w-64 bg-gray-900 text-white p-5">
      <h1 class="text-2xl font-bold mb-8">HOME</h1>

      <nav>
        <ul class="space-y-4">
          <li>
            <a href="#" class="block hover:text-gray-300">
              Inicio
            </a>
          </li>

          <li>
            <a href="#" class="block hover:text-gray-300">
              Users
            </a>
          </li>

          <li>
            <a href="#" class="block hover:text-gray-300">
              Config
            </a>
          </li>

          <li>
            <a href="#" class="block hover:text-gray-300">
              Cerrar sesión
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Contenido -->
    <main class="flex-1 p-8">

      <h2 class="text-3xl font-bold mb-6">
        Bienvenido mai
      </h2>

      <!-- Cards -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

        <div class="bg-white p-6 rounded-xl shadow">
          <h3 class="text-gray-500">Usuarios</h3>
          <p class="text-3xl font-bold mt-2">120</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
          <h3 class="text-gray-500">Ventas</h3>
          <p class="text-3xl font-bold mt-2">35</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
          <h3 class="text-gray-500">Mensajes</h3>
          <p class="text-3xl font-bold mt-2">8</p>
        </div>

      </div>

      <!-- Tabla -->
      <div class="bg-white rounded-xl shadow p-6">

        <h3 class="text-xl font-bold mb-4">
          Actividad reciente
        </h3>

        <table class="w-full border-collapse">

          <thead>
            <tr class="bg-gray-200">
              <th class="p-3 text-left">Usuario</th>
              <th class="p-3 text-left">Acción</th>
              <th class="p-3 text-left">Fecha</th>
            </tr>
          </thead>

          <tbody>
            <tr class="border-b">
              <td class="p-3">Andy</td>
              <td class="p-3">Inicio de sesión</td>
              <td class="p-3">21/05/2026</td>
            </tr>

            <tr class="border-b">
              <td class="p-3">María</td>
              <td class="p-3">Registro</td>
              <td class="p-3">21/05/2026</td>
            </tr>
          </tbody>

        </table>

      </div>

    </main>

  </div>

</body>
</html>
