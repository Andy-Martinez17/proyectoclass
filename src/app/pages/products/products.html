
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tabla</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
    }

    table{
      width: 80%;
      border-collapse: collapse;
      margin: auto;
      background: white;
    }

    th, td{
      border: 1px solid black;
      padding: 12px;
      text-align: center;
    }

    th{
      background-color: #007bff;
      color: white;
    }

    tr:nth-child(even){
      background-color: #f2f2f2;
    }
  </style>
</head>

<body>

  <h2 style="text-align:center;">Tabla de Productos</h2>

  <table>
    <tr>
      <th>ID</th>
      <th>Producto</th>
      <th>Precio</th>
      <th>Cantidad</th>
    </tr>

    <tr>
      <td>1</td>
      <td>Laptop</td>
      <td>$15,000</td>
      <td>5</td>
    </tr>

    <tr>
      <td>2</td>

    </tr>

    <tr>

    </tr>

    <tr>
      <td>4</td>

    </tr>
  </table>

</body>
</html>
